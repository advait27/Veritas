name: Desktop Extension

# Builds the Claude Desktop extension (.mcpb) and attaches it to a GitHub Release.
# Push a version tag to cut a release with the bundle attached:
#   git tag v0.1.0 && git push origin v0.1.0
# Or run it manually (workflow_dispatch) to get the .mcpb as a downloadable artifact.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create/update the release and upload the asset

jobs:
  build-mcpb:
    name: pack + attach .mcpb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync bundle version to the tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="${GITHUB_REF_NAME#v}"
          tmp="$(mktemp)"
          jq --arg v "$version" '.version = $v' mcpb/manifest.json > "$tmp"
          mv "$tmp" mcpb/manifest.json

      - name: Pack the extension
        run: |
          npx -y @anthropic-ai/mcpb@latest validate mcpb/manifest.json
          npx -y @anthropic-ai/mcpb@latest pack mcpb veritas.mcpb
          npx -y @anthropic-ai/mcpb@latest info veritas.mcpb

      - name: Upload as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: veritas-mcpb
          path: veritas.mcpb

      - name: Attach to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: veritas.mcpb
