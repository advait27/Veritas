name: Release

# Publishes veritas-mcp to PyPI via Trusted Publishing (OIDC — no API tokens stored).
# Trigger by pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# One-time PyPI setup is documented in RELEASE.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: gate + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Gate (format, lint, types, tests)
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy
          uv run pytest

      - name: Build sdist + wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/veritas-mcp
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - name: Download distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
